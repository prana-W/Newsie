<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>newsie — by Fin-Z</title>
    <meta name="description" content="Gen-Z financial news, reimagined. Swipe through what matters." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <!-- Desktop wrapper — centers a phone-sized frame on desktop -->
    <div class="desktop-bg">
        <div class="phone-frame" id="phone-frame">

            <!-- ── Card Stack (vertical swipe) ───────────────── -->
            <div class="card-viewport" id="card-viewport">
                <div class="card-track" id="card-track">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- ── Progress bars (left side) ─────────────────── -->
            <div class="progress-rail" id="progress-rail"></div>

            <!-- ── Top bar ───────────────────────────────────── -->
            <div class="top-bar">
                <span class="app-brand">newsie</span>
                <div class="category-badge" id="category-badge">World</div>
            </div>

            <!-- ── Bottom hint ───────────────────────────────── -->
            <div class="bottom-hint" id="bottom-hint">
                <span class="hint-text">swipe up for next story</span>
                <span class="hint-arrow">↑</span>
            </div>

            <!-- ── Detail View (slides in from right) ────────── -->
            <div class="detail-panel" id="detail-panel">
                <div class="detail-hero" id="detail-hero">
                    <div class="detail-gradient"></div>
                    <button class="detail-back" id="detail-back">← Back</button>
                </div>
                <div class="detail-body" id="detail-body">
                    <!-- Filled by JS -->
                </div>
            </div>

            <!-- ── Voice Chat Mic FAB ─────────────────────────── -->
            <button class="voice-fab" id="voice-fab" aria-label="Voice Chat">
                <svg class="voice-fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <div class="voice-fab-aura" id="voice-aura"></div>
            </button>

            <!-- ── Voice Chat Bottom Overlay ──────────────────────── -->
            <div class="voice-overlay" id="voice-overlay">
                <div class="voice-overlay-bar">
                    <div class="voice-aura-ring" id="voice-aura"></div>
                    <div class="voice-info">
                        <span class="voice-status" id="voice-status"></span>
                        <div class="voice-user-bubbles" id="voice-user-bubbles">
                            <!-- User speech bubbles injected by JS -->
                        </div>
                        <div class="voice-tool-indicator" id="voice-tool-indicator"></div>
                    </div>
                    <button class="voice-close" id="voice-close" aria-label="End voice chat">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- ── Desktop nav arrows ────────────────────────── -->
            <div class="desktop-nav" id="desktop-nav">
                <button class="desk-arrow" id="desk-up" aria-label="Previous">↑</button>
                <button class="desk-arrow" id="desk-down" aria-label="Next">↓</button>
            </div>

        </div>
    </div>

    <script src="/static/app.js"></script>
    <script src="/static/voice-chat.js"></script>
</body>
</html>
